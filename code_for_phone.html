<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crema Operation</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1c1f26;
            --text-main: #ffffff;
            --text-muted: #8a8d93;
            --accent-blue: #00d2ff;
            --accent-coffee: #c9803a;
            --border-radius: 20px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #main-ui {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .remote-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header { text-align: center; }
        .header h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }

        .coffee-section { display: flex; flex-direction: column; gap: 14px; }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .coffee-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .coffee-btn {
            background-color: #2a2d35;
            border: 1.5px solid transparent;
            border-radius: 16px;
            padding: 14px 8px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .coffee-btn:hover { background-color: #353942; }
        .coffee-btn:active { transform: scale(0.97); }

        .coffee-btn .cup-wrap { width: 48px; height: 48px; }

        .coffee-btn .cup-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.2s;
            letter-spacing: 0.02em;
        }
        .coffee-btn .cup-sub {
            font-size: 10px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .coffee-btn.selected {
            border-color: var(--accent-coffee);
            background-color: rgba(201, 128, 58, 0.12);
        }
        .coffee-btn.selected .cup-label {
            color: var(--accent-coffee);
        }

        .brew-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #c9803a 0%, #a85e20 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.12s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }
        .brew-btn:disabled {
            opacity: 0.35;
            cursor: default;
        }
        .brew-btn:not(:disabled):hover { transform: scale(1.02); }
        .brew-btn:not(:disabled):active { transform: scale(0.98); }

        .brew-btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            width: 8px; height: 8px;
            animation: rippleAnim 0.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { width: 300px; height: 300px; opacity: 0; margin-left: -150px; margin-top: -150px; }
        }

        .brew-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-coffee);
            border-radius: 2px;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="color: #8a8d93; font-size: 13px;">Connecting…</p>
    </div>

    <div id="main-ui">
        <div class="remote-card">

            <div class="header">
                <h1>Crema</h1>
            </div>

            <div class="coffee-section">
                <span class="section-label">Select coffee type</span>

                <div class="coffee-grid">

                    <button class="coffee-btn" data-type="ristretto" onclick="selectCoffee(this)">
                        <div class="cup-wrap">
                            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="14" y="28" width="20" height="3" rx="1.5" fill="#6b3c1a" opacity="0.5"/>
                                <path d="M13 18 L15 38 Q15.5 40 18 40 L30 40 Q32.5 40 33 38 L35 18 Z" fill="#3a200e"/>
                                <path d="M14 18 L16 36 Q16.5 38.5 18.5 38.5 L29.5 38.5 Q31.5 38.5 32 36 L34 18 Z" fill="#5c2e10"/>
                                <rect x="13" y="16" width="22" height="3" rx="1.5" fill="#7a3d14"/>
                                <ellipse cx="24" cy="17.5" rx="11" ry="2" fill="#9b5420"/>
                                <ellipse cx="24" cy="16.5" rx="10" ry="1.5" fill="#c9803a" opacity="0.6"/>
                                <path d="M22 9 Q23 7 24 9 Q25 11 26 9" stroke="#c9803a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
                                <ellipse cx="24" cy="38.5" rx="9" ry="1.5" fill="#2a1508" opacity="0.4"/>
                            </svg>
                        </div>
                        <span class="cup-label">Ristretto</span>
                        <span class="cup-sub">15ml · intense</span>
                    </button>

                    <button class="coffee-btn" data-type="espresso" onclick="selectCoffee(this)">
                        <div class="cup-wrap">
                            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="12" y="30" width="24" height="3" rx="1.5" fill="#6b3c1a" opacity="0.5"/>
                                <path d="M11 19 L13 40 Q13.5 42 16.5 42 L31.5 42 Q34.5 42 35 40 L37 19 Z" fill="#3a200e"/>
                                <path d="M12 19 L14 38.5 Q14.5 41 17 41 L31 41 Q33.5 41 34 38.5 L36 19 Z" fill="#5c2e10"/>
                                <path d="M35 24 Q39 24 39 27.5 Q39 31 35 31" stroke="#7a3d14" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                                <rect x="11" y="17" width="26" height="3.5" rx="1.75" fill="#7a3d14"/>
                                <ellipse cx="24" cy="18.75" rx="13" ry="2.5" fill="#9b5420"/>
                                <ellipse cx="24" cy="17.5" rx="12" ry="1.8" fill="#c9803a" opacity="0.6"/>
                                <path d="M21 10 Q22.5 7.5 24 10 Q25.5 12.5 27 10" stroke="#c9803a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
                            </svg>
                        </div>
                        <span class="cup-label">Espresso</span>
                        <span class="cup-sub">30ml · balanced</span>
                    </button>

                    <button class="coffee-btn" data-type="lungo" onclick="selectCoffee(this)">
                        <div class="cup-wrap">
                            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="11" y="32" width="26" height="3" rx="1.5" fill="#6b3c1a" opacity="0.5"/>
                                <path d="M10 16 L12 43 Q12.5 45 16 45 L32 45 Q35.5 45 36 43 L38 16 Z" fill="#3a200e"/>
                                <path d="M11 16 L13 41.5 Q13.5 43.5 16.5 43.5 L31.5 43.5 Q34.5 43.5 35 41.5 L37 16 Z" fill="#5c2e10"/>
                                <path d="M36 22 Q41 22 41 26.5 Q41 31 36 31" stroke="#7a3d14" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                                <rect x="10" y="14" width="28" height="3.5" rx="1.75" fill="#7a3d14"/>
                                <ellipse cx="24" cy="15.75" rx="14" ry="2.5" fill="#9b5420"/>
                                <ellipse cx="24" cy="14.5" rx="13" ry="1.8" fill="#c9803a" opacity="0.5"/>
                                <path d="M19 8 Q21 5 23 8 Q25 11 27 8 Q29 5 31 8" stroke="#c9803a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
                            </svg>
                        </div>
                        <span class="cup-label">Lungo</span>
                        <span class="cup-sub">110ml · smooth</span>
                    </button>

                </div>

                <button class="brew-btn" id="brewBtn" disabled onclick="triggerBrew(event)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
                        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
                        <line x1="6" y1="2" x2="6" y2="4"/>
                        <line x1="10" y1="2" x2="10" y2="4"/>
                        <line x1="14" y1="2" x2="14" y2="4"/>
                    </svg>
                    <span id="brewLabel">Select a coffee first</span>
                </button>

                <div class="progress-bar-wrap" id="progressWrap">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>

                <p class="brew-hint" id="brewHint">Choose ristretto, espresso or lungo above</p>
            </div>

        </div>
    </div>

    <script>
        window.addEventListener('load', function () {
            setTimeout(function () {
                var ls = document.getElementById('loading-screen');
                var ui = document.getElementById('main-ui');
                ls.style.opacity = '0';
                ui.style.opacity = '1';
                setTimeout(function () { ls.style.display = 'none'; }, 500);
            }, 1200);
        });

        var selected = null;
        var brewing = false;
        var countdownInterval = null;

        function selectCoffee(btn) {
            if (brewing) return;
            document.querySelectorAll('.coffee-btn').forEach(function (b) { b.classList.remove('selected'); });
            if (selected === btn.dataset.type) {
                selected = null;
                updateBrewBtn();
                return;
            }
            btn.classList.add('selected');
            selected = btn.dataset.type;
            updateBrewBtn();
        }

        function updateBrewBtn() {
            var btn = document.getElementById('brewBtn');
            var label = document.getElementById('brewLabel');
            var hint = document.getElementById('brewHint');
            if (!selected) {
                btn.disabled = true;
                label.textContent = 'Select a coffee first';
                hint.textContent = 'Choose ristretto, espresso or lungo above';
            } else {
                btn.disabled = false;
                var names = { ristretto: 'Brew Ristretto', espresso: 'Brew Espresso', lungo: 'Brew Lungo' };
                label.textContent = names[selected];
                hint.textContent = 'Ready to brew';
            }
        }

        function triggerBrew(e) {
			if (brewing || !selected) return;
            
                // Define the elements so the code can find them
                var btn = document.getElementById('brewBtn');
                var label = document.getElementById('brewLabel');
                var hint = document.getElementById('brewHint');
                var progressWrap = document.getElementById('progressWrap');
                var progressFill = document.getElementById('progressFill');
            
                // Create ripple effect
                var ripple = document.createElement('span');
                ripple.classList.add('ripple');
                ripple.style.left = (e.clientX - btn.getBoundingClientRect().left) + 'px';
                ripple.style.top = (e.clientY - btn.getBoundingClientRect().top) + 'px';
                btn.appendChild(ripple);
                setTimeout(function() { ripple.remove(); }, 600);
            
                brewing = true;
                btn.disabled = true;
                document.querySelectorAll('.coffee-btn').forEach(function(b) { b.style.pointerEvents = 'none'; });
            
                // --- BLYNK CONFIGURATION ---
                const BLYNK_TOKEN = "Te62lesdsyaEPWzDi3gw57g0Lvwwucra"
                const cmdMap = { ristretto: 1, espresso: 2, lungo: 3 };
                const cmdValue = cmdMap[selected];
            
                label.textContent = 'Sending to Cloud…';
            
                // ── Send command to Blynk Cloud API ──────────────────────────
                fetch(`https://blynk.cloud/external/api/update?token=${BLYNK_TOKEN}&V0=${cmdValue}`)
                .then(function (res) {
                    if (!res.ok) throw new Error('Cloud error ' + res.status);
                    // Start the visual countdown on the phone
                    startCountdown(selected, btn, label, hint, progressWrap, progressFill);
                })
                .catch(function (err) {
                    brewing = false;
                    btn.disabled = false;
                    document.querySelectorAll('.coffee-btn').forEach(function(b) { b.style.pointerEvents = ''; });
                    label.textContent = 'Cloud Failed';
                    hint.textContent = err.message;
                });
        }

        function startCountdown(coffeeType, btn, label, hint, progressWrap, progressFill) {
            var totalSeconds = 50;
            var remaining = totalSeconds;

            label.textContent = 'Brewing… ' + remaining + 's';
            hint.textContent = 'Your ' + coffeeType + ' is being prepared';

            progressWrap.style.display = 'block';
            progressFill.style.width = '0%';
            setTimeout(function () {
                progressFill.style.width = '100%';
                progressFill.style.transition = 'width ' + totalSeconds + 's linear';
            }, 50);

            countdownInterval = setInterval(function () {
                remaining--;
                if (remaining > 0) {
                    label.textContent = 'Brewing… ' + remaining + 's';
                } else {
                    clearInterval(countdownInterval);
                    brewing = false;
                    btn.disabled = false;
                    document.querySelectorAll('.coffee-btn').forEach(function (b) { b.style.pointerEvents = ''; });
                    label.textContent = 'Done! Brew another?';
                    hint.textContent = 'Your ' + coffeeType + ' is ready ☕';
                    progressFill.style.transition = 'none';
                    progressFill.style.width = '100%';
                    setTimeout(function () {
                        progressWrap.style.display = 'none';
                        progressFill.style.width = '0%';
                    }, 1500);
                }
            }, 1000);
        }
    </script>

</body>
</html>
